apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracking
  template:
    metadata:
      labels:
        app: tracking
    spec:
      containers:
      - name: tracking-container
        image: tracking-service:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: tracking-service
spec:
  type: NodePort
  selector:
    app: tracking
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30001